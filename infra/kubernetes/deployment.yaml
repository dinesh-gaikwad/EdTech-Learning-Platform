apiVersion: apps/v1

kind: Deployment

metadata:

  name: edtech-backend

spec:

  replicas: 2

  selector:

    matchLabels:

      app: edtech-backend

  template:

    metadata:

      labels:

        app: edtech-backend

    spec:

      containers:

      - name: backend

        image: edtech-backend:latest

        imagePullPolicy: Never

        ports:

        - containerPort: 8000

        env:

        - name: DEBUG

          value: "True"

        - name: DB_HOST

          value: mysql

        - name: DB_NAME

          value: edtech

        - name: DB_USER

          value: root

        - name: DB_PASSWORD

          value: root

        resources:

          requests:

            memory: "256Mi"

            cpu: "250m"

          limits:

            memory: "512Mi"

            cpu: "500m"

---

apiVersion: apps/v1

kind: Deployment

metadata:

  name: edtech-frontend

spec:

  replicas: 2

  selector:

    matchLabels:

      app: edtech-frontend

  template:

    metadata:

      labels:

        app: edtech-frontend

    spec:

      containers:

      - name: frontend

        image: edtech-frontend:latest

        imagePullPolicy: Never

        ports:

        - containerPort: 5173

        resources:

          requests:

            memory: "128Mi"

            cpu: "200m"

          limits:

            memory: "256Mi"

            cpu: "400m"
