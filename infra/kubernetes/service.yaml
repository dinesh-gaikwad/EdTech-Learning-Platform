apiVersion: v1

kind: Service

metadata:

  name: edtech-backend-service

spec:

  selector:

    app: edtech-backend

  ports:

    - protocol: TCP

      port: 8000

      targetPort: 8000

  type: LoadBalancer

---

apiVersion: v1

kind: Service

metadata:

  name: edtech-frontend-service

spec:

  selector:

    app: edtech-frontend

  ports:

    - protocol: TCP

      port: 5173

      targetPort: 5173

  type: LoadBalancer
