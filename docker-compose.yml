version: '3.9'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass2026
      MYSQL_DATABASE: edtech_db
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=mysql://root:rootpass2026@mysql:3306/edtech_db
      - OLLAMA_URL=http://ollama:11434/api/generate
      - SECRET_KEY=dev-secret-2026
      - DEBUG=True
    depends_on:
      - mysql
      - redis
      - ollama
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  ollama_data:
