version: '3.9'

services:

  mysql:
    image: mysql:8.0
    container_name: edtech_mysql

    restart: always

    environment:
      MYSQL_DATABASE: edtech
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: edtech
      MYSQL_PASSWORD: edtech

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - edtech_network

  redis:
    image: redis:7
    container_name: edtech_redis

    restart: always

    ports:
      - "6379:6379"

    networks:
      - edtech_network

  backend:
    build:
      context: ./backend

    container_name: edtech_backend

    command: >
      sh -c "
      python manage.py makemigrations &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "

    volumes:
      - ./backend:/app

    ports:
      - "8000:8000"

    depends_on:
      - mysql
      - redis

    environment:
      DEBUG: "True"

      DB_NAME: edtech
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: mysql
      DB_PORT: 3306

      REDIS_HOST: redis
      REDIS_PORT: 6379

    networks:
      - edtech_network

  celery:
    build:
      context: ./backend

    container_name: edtech_celery

    command: celery -A config worker -l info

    volumes:
      - ./backend:/app

    depends_on:
      - redis
      - backend

    environment:
      DEBUG: "True"

      DB_NAME: edtech
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: mysql
      DB_PORT: 3306

      REDIS_HOST: redis
      REDIS_PORT: 6379

    networks:
      - edtech_network

  frontend:
    build:
      context: ./frontend

    container_name: edtech_frontend

    command: npm run dev -- --host

    volumes:
      - ./frontend:/app
      - /app/node_modules

    ports:
      - "5173:5173"

    depends_on:
      - backend

    networks:
      - edtech_network

volumes:
  mysql_data:

networks:
  edtech_network: